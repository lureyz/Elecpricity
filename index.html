<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElectriPrice</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
<path fill='%232563EB' d='M13 2L4 14h7l-1 8 10-14h-7z'/>
</svg>">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#F6F8FB;
--card:#ffffff;
--primary:#2563EB;
--text:#111827;
--muted:#6B7280;
--cheap:#22C55E;
--mid:#FACC15;
--expensive:#EF4444;
--border:#E5E7EB;
}

body{
font-family:"Inter",system-ui;
background:var(--bg);
margin:0;
padding:40px 20px;
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:35px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:700;
font-size:24px;
}

.logo svg{
width:34px;
height:34px;
}

.subtitle{
font-size:13px;
color:var(--muted);
}

/* STATS CARDS */

#stats{
display:flex;
gap:20px;
margin-bottom:25px;
}

.stat-card{
flex:1;
background:var(--card);
border-radius:16px;
padding:24px;
border:1px solid var(--border);
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.stat-title{
font-size:13px;
color:var(--muted);
margin-bottom:6px;
}

.stat-value{
font-size:26px;
font-weight:700;
}

.stat-cheap{
border-top:4px solid var(--cheap);
}

.stat-expensive{
border-top:4px solid var(--expensive);
}

.stat-average{
border-top:4px solid var(--primary);
}

/* CARDS */

.card{
background:var(--card);
border-radius:16px;
padding:22px;
border:1px solid var(--border);
box-shadow:0 8px 25px rgba(0,0,0,0.05);
margin-bottom:25px;
}

canvas{
margin-top:10px;
}

/* HOURS BAR */

.hours-bar{
display:grid;
grid-template-columns:repeat(24,1fr);
gap:3px;
margin-top:15px;
}

.hour{
height:18px;
border-radius:4px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
text-align:left;
padding:10px 0;
color:var(--muted);
border-bottom:1px solid var(--border);
}

td{
padding:10px 0;
border-bottom:1px solid var(--border);
}

.barato{
background:#E8FDF1;
}

.caro{
background:#FFECEC;
}

/* CALENDAR */

.calendar{
margin-top:30px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

button{
background:var(--primary);
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:500;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.date{
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<header>

<div>

<div class="logo">

<svg viewBox="0 0 24 24">
<path fill="#2563EB" d="M13 2L4 14h7l-1 8 10-14h-7z"/>
</svg>

ElectriPrice

</div>

<div class="subtitle">
Spain electricity price dashboard
</div>

</div>

</header>


<!-- STATS -->

<div id="stats">

<div class="stat-card stat-cheap">
<div class="stat-title">🟢 Hora más barata</div>
<div id="minHora" class="stat-value">-</div>
</div>

<div class="stat-card stat-expensive">
<div class="stat-title">🔴 Hora más cara</div>
<div id="maxHora" class="stat-value">-</div>
</div>

<div class="stat-card stat-average">
<div class="stat-title">📊 Precio medio</div>
<div id="avgPrecio" class="stat-value">-</div>
</div>

</div>


<!-- GRAPH -->

<div class="card">
<canvas id="grafico"></canvas>
</div>


<!-- HOURS BAR -->

<div class="card">
<div class="hours-bar" id="hoursBar"></div>
</div>


<!-- TABLE -->

<div class="card">
<table id="tabla">
<tr>
<th>Hora</th>
<th>€/MWh</th>
</tr>
</table>
</div>


<!-- CALENDAR -->

<div class="calendar">
<button onclick="cambiarDia(-1)">← Ayer</button>
<div id="fecha" class="date"></div>
<button onclick="cambiarDia(1)">Mañana →</button>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let fechaActual=new Date()
let chart

function formatDate(d){
return d.toISOString().split("T")[0]
}

function showDate(){
document.getElementById("fecha").innerText=formatDate(fechaActual)
}

function cambiarDia(n){
fechaActual.setDate(fechaActual.getDate()+n)
load()
}

async function load(){

showDate()

const date=formatDate(fechaActual)

const url=`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${date}T00:00&end_date=${date}T23:59&time_trunc=hour`

const r=await fetch(url)
const data=await r.json()

const valores=data.included[0].attributes.values

let horas=[]
let precios=[]

let min=Infinity
let max=-Infinity
let minHora=""
let maxHora=""

const tabla=document.getElementById("tabla")
tabla.innerHTML="<tr><th>Hora</th><th>€/MWh</th></tr>"

const bar=document.getElementById("hoursBar")
bar.innerHTML=""

valores.forEach(v=>{

const hora=v.datetime.substring(11,16)
const precio=v.value

horas.push(hora)
precios.push(precio)

if(precio<min){
min=precio
minHora=hora
}

if(precio>max){
max=precio
maxHora=hora
}

let fila=document.createElement("tr")

if(precio<80) fila.className="barato"
if(precio>120) fila.className="caro"

fila.innerHTML=`<td>${hora}</td><td>${precio.toFixed(2)}</td>`
tabla.appendChild(fila)

const block=document.createElement("div")
block.className="hour"

if(precio<80) block.style.background="#22C55E"
else if(precio<120) block.style.background="#FACC15"
else block.style.background="#EF4444"

bar.appendChild(block)

})

let avg=precios.reduce((a,b)=>a+b,0)/precios.length

document.getElementById("minHora").innerText=minHora+" ("+min.toFixed(2)+"€)"
document.getElementById("maxHora").innerText=maxHora+" ("+max.toFixed(2)+"€)"
document.getElementById("avgPrecio").innerText=avg.toFixed(2)+"€"

drawChart(horas,precios)

}

function drawChart(horas,precios){

const ctx=document.getElementById("grafico")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"line",
data:{
labels:horas,
datasets:[{
label:"€/MWh",
data:precios,
tension:0.35,
borderColor:"#2563EB",
fill:false
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}}
}
})

}

load()

</script>

</body>
</html>
